<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0; height: 100%; overflow: hidden;
        background: radial-gradient(120% 120% at 50% 0%, #1b2735 0%, #0d1117 60%);
        color: #e6edf3;
        font-family: "Segoe UI", system-ui, sans-serif;
        user-select: none;
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
      }
      .brand {
        font-size: 30px; font-weight: 700; letter-spacing: 0.5px;
        background: linear-gradient(90deg, #2f81f7 0%, #22d3ee 55%, #3fb950 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .sub { font-size: 12.5px; color: #8b949e; letter-spacing: 1px; }
      /* 유체 파동 애니메이션 바 */
      .waves { display: flex; gap: 5px; height: 34px; align-items: flex-end; }
      .waves span {
        width: 5px; border-radius: 3px;
        background: linear-gradient(180deg, #2f81f7, #22d3ee);
        animation: wave 1.1s ease-in-out infinite;
      }
      .waves span:nth-child(2) { animation-delay: 0.12s; }
      .waves span:nth-child(3) { animation-delay: 0.24s; }
      .waves span:nth-child(4) { animation-delay: 0.36s; }
      .waves span:nth-child(5) { animation-delay: 0.48s; }
      .waves span:nth-child(6) { animation-delay: 0.60s; }
      .waves span:nth-child(7) { animation-delay: 0.72s; }
      @keyframes wave {
        0%, 100% { height: 8px; opacity: 0.5; }
        50% { height: 34px; opacity: 1; }
      }
      .status { font-size: 12px; color: #8b949e; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">NavierTwin</div>
      <div class="sub">CFD · ROM · NEURAL OPERATORS · DIGITAL TWIN</div>
      <div class="waves">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="status">엔진 기동 중…</div>
    </div>
  </body>
</html>
