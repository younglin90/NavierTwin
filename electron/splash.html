      html, body {
        margin: 0; height: 100%; overflow: hidden;
        background:
          radial-gradient(130% 90% at 80% -10%, #12203a 0%, transparent 55%),
          #060b14;
        color: #d9e6f2;
        font-family: 'Chakra Petch', 'Malgun Gothic', sans-serif;
        user-select: none;
      }
      /* 청사진 측정 격자 */
      body::before {
        content: ""; position: fixed; inset: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
        background-size: 28px 28px;
        animation: drift 40s linear infinite;
      }
      @keyframes drift { to { background-position: 28px 28px; } }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
      }
      .brand {
        font-size: 30px; font-weight: 700; letter-spacing: 0.16em;
        color: #00e5ff; text-shadow: 0 0 18px rgba(0,229,255,0.6);
      }
      .sub {
        font-size: 10.5px; color: #66788f; letter-spacing: 0.34em;
      }
      /* 오실로스코프 트레이스 */
      .scope { width: 300px; height: 56px; }
      .scope polyline {
        fill: none; stroke: #00e5ff; stroke-width: 2;
        stroke-linecap: round; stroke-linejoin: round;
        filter: drop-shadow(0 0 6px rgba(0,229,255,0.8));
        stroke-dasharray: 640; stroke-dashoffset: 640;
        animation: trace 1.9s ease-in-out infinite;
      }
      @keyframes trace {
        0%   { stroke-dashoffset: 640; opacity: 1; }
        70%  { stroke-dashoffset: 0;   opacity: 1; }
        100% { stroke-dashoffset: 0;   opacity: 0; }
      }
      .status {
        font-size: 11px; color: #66788f; letter-spacing: 0.2em;
        animation: blink 1.6s ease-in-out infinite;
      }
      @keyframes blink { 50% { opacity: 0.35; } }
    </style>
