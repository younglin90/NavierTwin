name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      MPLCONFIGDIR: /tmp/mpl
      NAVIER_TWIN_LOG_DIR: /tmp/naviertwin/logs
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[core,dev]" pip-audit bandit

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: CLI smoke test
        run: |
          naviertwin --help
          python -m naviertwin.main --help
          python main.py --help

      - name: Release smoke suite
        run: python scripts/release_smoke.py
      - name: Installer contract smoke
        run: python scripts/installer_smoke.py

      - name: Wheel artifact smoke
        run: python scripts/wheel_smoke.py --install-smoke

      - name: Source distribution smoke
        run: python scripts/sdist_smoke.py --install-smoke

      - name: Code verification (MMS + convergence)
        run: pytest tests/integration/test_mms_convergence.py -v -m convergence

      - name: Validation benchmarks (V&V20)
        run: pytest tests/integration/test_vv_benchmarks.py -v -m vv

      - name: Security scan (pip-audit)
        run: pip-audit || echo "pip-audit reported issues (non-blocking)"

      - name: Static security (bandit)
        run: bandit -r src/naviertwin -x tests || echo "bandit reported issues (non-blocking)"

      - name: Verification report (5-layer aggregate)
        run: bash scripts/verify_all.sh
        continue-on-error: true

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report-py${{ matrix.python-version }}
          path: verify_artifacts/
