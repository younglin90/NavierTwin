name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" numpy h5py scikit-learn pytest-cov pip-audit bandit

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: CLI smoke test
        run: |
          python3 main.py --help
          python3 -m naviertwin.main --help

      - name: Run tests (core suite + coverage)
        run: |
          pytest -q -m "not optional" \
            --cov=src/naviertwin --cov-report=term-missing

      - name: Code verification (MMS + convergence)
        run: pytest tests/integration/test_mms_convergence.py -v -m convergence

      - name: Validation benchmarks (V&V20)
        run: pytest tests/integration/test_vv_benchmarks.py -v -m vv

      - name: Security scan (pip-audit)
        run: pip-audit || echo "pip-audit reported issues (non-blocking)"

      - name: Static security (bandit)
        run: bandit -r src/naviertwin -x tests || echo "bandit reported issues (non-blocking)"

      - name: Verification report (5-layer aggregate)
        run: bash scripts/verify_all.sh
        continue-on-error: true

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report-py${{ matrix.python-version }}
          path: verify_artifacts/
